# Pharos CI — build, lint, unit tests.
#
# Policy: GitHub Actions runs only at SemVer ≥ 1.0.0 (Beryndil CI Discipline).
# Pre-1.0 tags are explicitly excluded via the condition below.
# Introduced at the 1.0.0 version bump (Slice 11).

name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    # Skip on pre-1.0 tags (belt-and-suspenders; main branch pushes are not tagged pushes).
    if: "!startsWith(github.ref, 'refs/tags/v0.')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Lint
        run: ./gradlew --no-daemon :app:lintDebug

      - name: Unit tests
        run: ./gradlew --no-daemon :app:testDebugUnitTest

      - name: Assemble debug
        run: ./gradlew --no-daemon :app:assembleDebug

      # Release build (minified) uses the debug-keystore fallback when no keystore.properties
      # is present. Verifies R8/ProGuard rules are correct without the real signing key.
      # The real release keystore and Play App Signing are Dave's tasks — see TODO.md.
      - name: Assemble release (R8 verification)
        run: ./gradlew --no-daemon :app:assembleRelease
