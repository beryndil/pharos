# Pharos CI — build, lint, unit tests.
#
# Trigger: manual only (workflow_dispatch). Run from the GitHub Actions tab or:
#   gh workflow run build.yml
#
# Intentionally NOT on push/pull_request — CI minutes are reserved for
# deliberate verification runs, not every commit (Beryndil CI Discipline).

name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Lint
        run: ./gradlew --no-daemon :app:lintDebug

      - name: Unit tests
        run: ./gradlew --no-daemon :app:testDebugUnitTest

      - name: Assemble debug
        run: ./gradlew --no-daemon :app:assembleDebug

      # Release build (minified) uses the debug-keystore fallback when no keystore.properties
      # is present. Verifies R8/ProGuard rules are correct without the real signing key.
      # The real release keystore and Play App Signing are Dave's tasks — see TODO.md.
      - name: Assemble release (R8 verification)
        run: ./gradlew --no-daemon :app:assembleRelease
